<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蘋果的滋味｜角色心理測驗</title>

<style>
:root{
  --brown:#8c5b3f;
  --brown-dark:#6d432c;
  --text:#3c3028;
  --sub:#7d6b5e;
  --line:#d9c7b8;
  --quote:#b05643;
  --paper:#fffdf9;
  --paper2:#faf4ec;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
  background:
    radial-gradient(circle at top,#fff8f0 0%,transparent 30%),
    linear-gradient(180deg,#f5ede3,#e8d8c8);
  color:var(--text);
}

.wrapper{
  max-width:480px;
  margin:auto;
  padding:28px 18px 42px;
}

.card{
  background:var(--paper);
  border-radius:32px;
  padding:30px 24px;
  box-shadow:0 18px 48px rgba(0,0,0,.08);
  border:1px solid #ead9ca;
}

.hidden{
  display:none;
}

.kicker{
  text-align:center;
  font-size:13px;
  letter-spacing:.25em;
  color:var(--sub);
}

.title{
  text-align:center;
  font-size:34px;
  line-height:1.5;
  letter-spacing:.1em;
  margin:18px 0 12px;
}

.subtitle{
  text-align:center;
  line-height:2;
  font-size:15px;
  color:var(--sub);
}

.hero{
  margin:28px 0;
  padding:28px 20px;
  background:linear-gradient(180deg,#fff7ed,#f7eadc);
  border-radius:24px;
  text-align:center;
  border:1px solid #ead9ca;
}

.apple{
  font-size:72px;
  margin-bottom:10px;
}

.hero p{
  margin:0;
  line-height:1.9;
  color:var(--sub);
}

button{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px;
  margin:10px 0;
  cursor:pointer;
  font-size:15px;
  line-height:1.8;
  font-family:inherit;
}

.primary{
  background:var(--brown);
  color:white;
  letter-spacing:.12em;
}

.primary:hover{
  background:var(--brown-dark);
}

.choice{
  background:white;
  border:1px solid var(--line);
  color:var(--text);
  text-align:left;
}

.choice:hover{
  background:#f5e6d7;
}

.progressText{
  text-align:center;
  font-size:13px;
  letter-spacing:.15em;
  color:var(--sub);
}

.progressBar{
  height:8px;
  background:#e8ddd2;
  border-radius:99px;
  overflow:hidden;
  margin:14px 0 24px;
}

.progressFill{
  height:100%;
  width:0%;
  background:var(--brown);
  transition:.25s;
}

.scene{
  background:#fff7ee;
  border-left:4px solid var(--brown);
  padding:15px;
  line-height:1.95;
  color:var(--sub);
  border-radius:12px;
  margin-bottom:20px;
  font-size:14px;
}

.question{
  text-align:center;
  font-size:22px;
  line-height:1.7;
  margin-bottom:18px;
}

.roleImage{
  width:360px;
  height:360px;
  object-fit:contain;
  display:block;
  margin:0 auto 20px;
}

.resultName{
  text-align:center;
  font-size:36px;
  letter-spacing:.12em;
  margin-bottom:6px;
}

.resultTag{
  text-align:center;
  color:var(--brown);
  margin-bottom:18px;
  font-size:17px;
}

.resultBlock{
  background:var(--paper2);
  border-radius:20px;
  padding:18px;
  margin:16px 0;
  line-height:2;
}

.resultBlock h3{
  margin:0 0 10px;
  font-size:17px;
}

.resultBlock p{
  margin:0;
}

.quote{
  text-align:center;
  color:var(--quote);
  font-size:20px;
  line-height:1.9;
}

.aftertaste{
  background:#fff7ee;
  border:1px dashed #d9c7b8;
  border-radius:18px;
  padding:16px;
  text-align:center;
  line-height:2;
  color:var(--sub);
  margin-top:18px;
}

.small{
  text-align:center;
  font-size:12px;
  color:#8a7768;
  margin-top:14px;
  line-height:1.8;
}

@media(max-width:420px){
  .roleImage{
    width:320px;
    height:320px;
  }
}
</style>
</head>

<body>

<div class="wrapper">
<div class="card">

<section id="start">

<div class="kicker">蘋果的滋味</div>

<h1 class="title">你吃到的是<br>什麼味道？</h1>

<p class="subtitle">
一場車禍、一顆蘋果、<br>
一個突然變得「幸運」的家庭。<br><br>
透過幾個選擇，<br>
看看你最接近故事中的誰。
</p>

<div class="hero">
<div class="apple">🍎</div>
<p>
這不是普通的性格測驗。<br>
每一道選擇，<br>
都來自《蘋果的滋味》裡的生活處境。
</p>
</div>

<button class="primary" onclick="startQuiz()">開始測驗</button>

</section>

<section id="quiz" class="hidden">

<div class="progressText" id="progressText"></div>

<div class="progressBar">
<div class="progressFill" id="progressFill"></div>
</div>

<div class="scene" id="scene"></div>

<div class="question" id="question"></div>

<div id="answers"></div>

</section>

<section id="result" class="hidden">

<img class="roleImage" id="roleImage" alt="角色頭像">

<div class="resultName" id="roleName"></div>

<div class="resultTag" id="roleTag"></div>

<div class="resultBlock">
<h3>角色介紹</h3>
<p id="roleIntro"></p>
</div>

<div class="resultBlock">
<h3>你像他的地方</h3>
<p id="rolePersonality"></p>
</div>

<div class="resultBlock">
<h3>代表句／文本意象</h3>
<p class="quote" id="roleQuote"></p>
</div>

<div class="resultBlock">
<h3>象徵意義</h3>
<p id="roleSymbol"></p>
</div>

<div class="aftertaste" id="aftertaste"></div>

<button class="primary" onclick="restartQuiz()">重新測驗</button>

<p class="small">
《蘋果的滋味》不是在描寫幸福，<br>
而是在問：為什麼有些人必須受傷，才能碰到「運氣」？
</p>

</section>

</div>
</div>

<script>
const characterImages = {
  "江阿發":"jiang.png",
  "阿桂":"agui.png",
  "阿珠":"azhu.png",
  "阿吉":"aji.png",
  "格雷上校":"gray.png"
};

const questions = [
  {
    scene:"家中最近經濟困難，連學校代辦費都暫時繳不出來。老師當著全班提醒你，其他同學也看了過來。",
    question:"那一刻，你最可能有什麼反應？",
    answers:[
      ["覺得很丟臉，只想趕快低頭撐過去。","阿吉"],
      ["開始擔心家裡是不是又快撐不下去了。","阿桂"],
      ["想著自己能不能少花一點，或幫家裡分擔。","阿珠"],
      ["覺得難堪也沒辦法，生活還是得繼續。","江阿發"]
    ]
  },
  {
    scene:"你第一次走進一間乾淨明亮、設備齊全的醫院，裡面有蘋果、汽水和各種平常很少接觸到的東西。",
    question:"在那個瞬間，你最接近哪種感覺？",
    answers:[
      ["原來世界上真的有這麼新奇的東西。","阿吉"],
      ["好像連站在這裡都有點不自在。","阿桂"],
      ["第一次覺得有錢真的能改變生活。","江阿發"],
      ["這些東西對自己來說，其實再普通不過。","格雷上校"]
    ]
  },
  {
    scene:"一場原本很可怕的車禍，最後卻換來一筆能改善生活的補償。",
    question:"那個瞬間，你心裡最接近哪一句話？",
    answers:[
      ["至少家裡暫時能撐下去了。","阿桂"],
      ["為什麼一定要受傷，才能過比較好的生活？","阿珠"],
      ["也許這真的算是一種「運氣」。","江阿發"],
      ["如果有能力，就應該把事情補償回來。","格雷上校"]
    ]
  },
  {
    scene:"家裡氣氛變得很沉重，每個人都在擔心以後的日子。",
    question:"你通常會先變成哪種人？",
    answers:[
      ["先確認大家是不是都還好。","阿珠"],
      ["開始盤算接下來該怎麼撐下去。","江阿發"],
      ["假裝沒事，但其實心裡很害怕。","阿吉"],
      ["試著用自己的能力幫忙解決問題。","格雷上校"]
    ]
  },
  {
    scene:"故事裡的蘋果，其實不只是水果。對江家來說，它像是突然掉進生活裡的另一個世界。",
    question:"如果是你，你覺得那顆蘋果最後吃起來像什麼？",
    answers:[
      ["第一次知道原來世界上有這麼甜的東西。","阿吉"],
      ["明明是甜的，心裡卻還是慌的。","阿桂"],
      ["好像還沒吃完，人就突然長大了。","阿珠"],
      ["原來有些好日子，是受傷後才換來的。","江阿發"]
    ]
  }
];

const results = {
  "江阿發":{
    tag:"一家之主，靠勞力維生",
    intro:"江阿發是家中的經濟支柱。原本只是騎腳踏車去工作，卻因車禍被送進美國醫院。故事中，他從害怕殘廢、擔心家庭生計，逐漸轉向把補償視為家庭翻身的可能。",
    personality:"你和江阿發一樣，面對困境時會先考慮現實問題。你不是單純貪財，而是知道生活壓力會逼人務實，甚至把不幸看成唯一的機會。",
    quote:"「運氣，碰到運氣了。」",
    symbol:"江阿發象徵底層勞動者的辛苦與矛盾。他的「幸運」其實很酸澀，因為那份改善生活的機會，是用身體受傷換來的。",
    taste:"你吃到的蘋果，帶著現實生活裡酸澀卻不得不吞下去的味道。"
  },
  "阿桂":{
    tag:"情緒外露，守護家庭",
    intro:"阿桂是江阿發的妻子。得知丈夫出車禍後，她一路哭喊，害怕丈夫殘廢後全家失去依靠。進入美國醫院後，她同時恐懼陌生環境，也被補償與物資吸引。",
    personality:"你和阿桂一樣，對家庭安全感非常敏感。你的情緒不是脆弱，而是因為你很清楚：一旦主要支柱倒下，整個家庭都可能跟著崩塌。",
    quote:"「一家大小都要靠他呀！」",
    symbol:"阿桂象徵底層女性在貧窮與權力面前的求生反應。她的哭泣不是單純悲傷，而是長期生活壓力下的本能防衛。",
    taste:"你吃到的蘋果，有一點甜，但更多的是對失去的害怕。"
  },
  "阿珠":{
    tag:"早熟懂事，替家人著想",
    intro:"阿珠是家中長女。父親出事後，她去學校接弟弟們，也想像自己可能被賣去當養女，好替家裡減輕負擔。她在故事中承擔了超過年齡的責任。",
    personality:"你和阿珠一樣，常常下意識替別人想很多。你明明也會害怕，卻容易先把自己的感受收起來，選擇照顧家人和穩住場面。",
    quote:"「她忽然覺得自己已經不是小孩子了。」",
    symbol:"阿珠象徵貧窮家庭中被迫早熟的孩子。她的懂事讓人心疼，因為那不是浪漫的犧牲，而是貧困造成的壓力轉移。",
    taste:"你吃到的蘋果，看起來成熟，其實藏著太早長大的酸味。"
  },
  "阿吉":{
    tag:"天真敏感，容易滿足",
    intro:"阿吉是江阿發的兒子。他因為繳不起代辦費在學校被罰站，後來進入美國醫院，對蘋果、汽水罐與豪華環境感到新奇又興奮。",
    personality:"你和阿吉一樣，對世界保有好奇心。即使環境有壓力，你仍會被小小的新鮮事物吸引，從苦日子裡找到短暫的快樂。",
    quote:"「一只蘋果可以買四斤米。」",
    symbol:"阿吉象徵兒童在貧窮中的真實感受。他既承受羞辱，也會被物質新奇吸引，呈現出孩子有限卻誠實的理解。",
    taste:"你吃到的蘋果，是短暫卻真實的甜味。"
  },
  "格雷上校":{
    tag:"外來權力，帶著善意",
    intro:"格雷上校是撞傷江阿發的美國人。他送江家人到醫院，提供補償與照顧。表面上他有責任感，但他的存在也代表美國權力與台灣底層家庭之間的不平等。",
    personality:"你和格雷上校一樣，願意幫助別人，也習慣從資源與制度的角度思考問題。但有時候，真正的距離不是善意，而是彼此不同的位置。",
    quote:"「美國人把他們帶進那間白色醫院。」",
    symbol:"格雷上校象徵外來權力與現代化資源。他不是單純的壞人，但他的善意建立在巨大的階級差距上，因此帶有複雜的諷刺。",
    taste:"你吃到的蘋果，是一種站在不同位置才看得到的甜味。"
  }
};

let scores = {};
let current = 0;

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

function startQuiz(){
  scores = {
    "江阿發":0,
    "阿桂":0,
    "阿珠":0,
    "阿吉":0,
    "格雷上校":0
  };

  current = 0;

  document.getElementById("start").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  showQuestion();
}

function showQuestion(){
  const q = questions[current];

  document.getElementById("progressText").innerText = "Q " + (current+1) + " / " + questions.length;
  document.getElementById("progressFill").style.width = ((current+1)/questions.length*100) + "%";

  document.getElementById("scene").innerText = q.scene;
  document.getElementById("question").innerText = q.question;

  const answerBox = document.getElementById("answers");
  answerBox.innerHTML = "";

  const shuffled = shuffle([...q.answers]);

  shuffled.forEach(ans => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerText = ans[0];

    btn.onclick = () => {
      scores[ans[1]]++;
      current++;

      if(current < questions.length){
        showQuestion();
      }else{
        showResult();
      }
    };

    answerBox.appendChild(btn);
  });
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  const top = Object.keys(scores).sort((a,b)=>scores[b]-scores[a])[0];

  const r = results[top];

  document.getElementById("roleImage").src = characterImages[top];
  document.getElementById("roleName").innerText = top;
  document.getElementById("roleTag").innerText = r.tag;
  document.getElementById("roleIntro").innerText = r.intro;
  document.getElementById("rolePersonality").innerText = r.personality;
  document.getElementById("roleQuote").innerText = r.quote;
  document.getElementById("roleSymbol").innerText = r.symbol;
  document.getElementById("aftertaste").innerText = r.taste;
}

function restartQuiz(){
  document.getElementById("result").classList.add("hidden");
  document.getElementById("start").classList.remove("hidden");
  window.scrollTo(0,0);
}
</script>

</body>
</html>
