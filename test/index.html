<!DOCTYPE html>
<html lang='zh-Hant'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>蘋果的滋味心理測驗</title>
<style>
body{margin:0;font-family:"Noto Serif TC",serif;background:linear-gradient(180deg,#f8f3ec,#ede0d2);color:#3f352d;}
.page{max-width:460px;margin:auto;padding:28px 18px 40px;}
.card{background:#fffdf8;border-radius:30px;padding:28px 24px;box-shadow:0 18px 50px rgba(0,0,0,.08);}
.title{text-align:center;font-size:32px;letter-spacing:.15em;}
.subtitle{text-align:center;line-height:2;color:#7e6b5b;}
.hero{background:#f8efe2;padding:24px;border-radius:24px;text-align:center;margin:24px 0;}
.apple{font-size:60px;}
button{width:100%;padding:15px;margin:10px 0;border:none;border-radius:18px;font-size:15px;font-family:inherit;cursor:pointer;}
.primary{background:#9b6b4c;color:white;}
.choice{background:white;border:1px solid #d9c9ba;text-align:left;line-height:1.8;padding-left:18px;}
.choice:hover{background:#f3e5d7;}
.hidden{display:none;}
.progressText{text-align:center;color:#7e6b5b;font-size:13px;letter-spacing:.14em;margin-bottom:10px;}
.progressBar{height:8px;background:#eadfd4;border-radius:99px;overflow:hidden;margin-bottom:22px;}
.progressFill{height:100%;width:0%;background:#9b6b4c;border-radius:99px;transition:.25s;}
.scene{background:#fff8ef;padding:14px;border-left:4px solid #9b6b4c;line-height:1.9;color:#7e6b5b;margin-bottom:18px;}
.question{font-size:21px;line-height:1.75;text-align:center;margin-bottom:18px;}
.roleImage{width:280px;height:280px;object-fit:contain;display:block;margin:8px auto 18px;}
.resultName{text-align:center;font-size:32px;}
.resultTag{text-align:center;color:#9b6b4c;font-size:17px;margin-bottom:18px;}
.resultBlock{background:#fbf6ef;padding:16px;border-radius:18px;margin:16px 0;line-height:2;}
.quote{text-align:center;font-size:18px;color:#b95b45;}
.small{text-align:center;color:#8b7a6b;font-size:12px;line-height:1.8;}
</style>
</head>
<body>
<div class='page'>
<div class='card'>

<section id='start'>
<h1 class='title'>你是誰？</h1>
<p class='subtitle'>
一場車禍、一間白色醫院、<br>
一顆酸酸澀澀的蘋果。<br>
測出你在《蘋果的滋味》裡最接近的角色。
</p>

<div class='hero'>
<div class='apple'>🍎</div>
<p>每一題都會帶你走進角色的處境。</p>
</div>

<button class='primary' onclick='startQuiz()'>進入白色醫院</button>
</section>

<section id='quiz' class='hidden'>
<div class='progressText' id='progressText'></div>
<div class='progressBar'><div class='progressFill' id='progressFill'></div></div>
<div class='scene' id='scene'></div>
<h2 class='question' id='question'></h2>
<div id='answers'></div>
</section>

<section id='result' class='hidden'>
<div class='progressText'>你的角色對照小卡</div>
<div class='progressBar'><div class='progressFill' style='width:100%'></div></div>

<img class='roleImage' id='roleImage'>
<h2 class='resultName' id='roleName'></h2>
<div class='resultTag' id='roleTag'></div>

<div class='resultBlock'><h3>角色介紹</h3><p id='roleIntro'></p></div>
<div class='resultBlock'><h3>你像他的地方</h3><p id='rolePersonality'></p></div>
<div class='resultBlock'><h3>代表句／文本意象</h3><p class='quote' id='roleQuote'></p></div>
<div class='resultBlock'><h3>象徵意義</h3><p id='roleSymbol'></p></div>

<button class='primary' onclick='restart()'>重新測驗</button>
<p class='small'>可截圖分享你的角色卡，讓更多人從角色進入台灣文學。</p>
</section>

</div>
</div>

<script>
const characterImages={
"江阿發":"jiang.png",
"阿桂":"agui.png",
"阿珠":"azhu.png",
"阿吉":"aji.png",
"格雷上校":"gray.png"
};

const questions=[
{
scene:"阿吉因為繳不出代辦費，在學校被罰站。貧窮不是抽象的，它會直接出現在教室裡。",
q:"如果你在眾人面前因為「沒錢」而被提醒，你最接近哪種反應？",
a:[
["低頭忍住，假裝自己不在意。","阿吉"],
["開始擔心家裡是不是又快撐不下去了。","阿桂"],
["想著自己是不是可以少花一點，替家裡分擔。","阿珠"],
["覺得丟臉也沒辦法，生活還是要繼續。","江阿發"],
["一時無法理解，為什麼這件事會造成這麼大的傷害。","格雷上校"]
]
},
{
scene:"江阿發原本只是騎腳踏車去工作，卻被格雷上校的轎車撞傷，整個家庭的命運被迫轉向。",
q:"當一場意外突然打亂生活，你第一時間會想的是？",
a:[
["家裡之後怎麼辦？收入會不會斷掉？","江阿發"],
["人會不會出事？以後要怎麼活？","阿桂"],
["我得先冷靜下來，幫忙照顧其他人。","阿珠"],
["事情太突然了，我只能跟著大家走。","阿吉"],
["我應該承擔責任，盡快補償與處理。","格雷上校"]
]
},
{
scene:"美國醫院乾淨、明亮、物資充足，和江家原本的生活形成強烈對比。",
q:"第一次進到一個明顯比自己生活高級很多的地方，你會？",
a:[
["覺得自己好像不屬於這裡，但也希望能留下。","阿桂"],
["忍不住一直看，覺得什麼都新奇。","阿吉"],
["提醒自己不要出錯，也不要讓家人難堪。","阿珠"],
["想著如果有錢，家裡是不是就不用那麼辛苦。","江阿發"],
["覺得這只是普通環境，不太懂別人的驚訝。","格雷上校"]
]
},
{
scene:"故事最諷刺的地方在於：受傷原本是災難，卻因為補償金，變成一家人眼中的「運氣」。",
q:"如果痛苦竟然換來一筆能改善生活的錢，你會怎麼想？",
a:[
["雖然難受，但這可能是家裡翻身的機會。","江阿發"],
["終於可以鬆一口氣，至少不用立刻崩潰。","阿桂"],
["心裡矛盾，不知道該高興還是難過。","阿珠"],
["只感覺好像突然有很多好東西可以期待。","阿吉"],
["補償是應該的，我會用制度或金錢解決問題。","格雷上校"]
]
},
{
scene:"阿珠一路照顧弟弟，也想像自己可能被賣去當養女，替家裡減輕壓力。",
q:"當家裡陷入困難，你最可能扮演什麼角色？",
a:[
["默默接住別人的情緒，先把大家安頓好。","阿珠"],
["努力撐住家計，不讓家倒下。","江阿發"],
["情緒會先崩出來，因為真的太害怕失去。","阿桂"],
["不太懂大人的壓力，但會感覺氣氛不對。","阿吉"],
["想用自己的資源替大家安排出路。","格雷上校"]
]
}
];

const results={
"江阿發":{
tag:"一家之主，靠勞力維生",
intro:"江阿發是家中的經濟支柱，原本只是騎腳踏車去工作，卻因車禍被送進美國醫院。故事中，他從害怕殘廢、擔心家庭生計，逐漸轉向把補償視為家庭翻身的可能。",
personality:"你和江阿發一樣，面對困境時會先想現實問題。你不是單純重利，而是知道生活壓力會逼人務實，甚至把不幸看成唯一的機會。",
quote:"「謝謝！謝謝！對不起，對不起，……」",
symbol:"江阿發象徵底層勞動者的辛苦與矛盾。他的「幸運」其實很酸澀，因為那份改善生活的機會，是用身體受傷換來的。"
},
"阿桂":{
tag:"情緒外露，守護家庭",
intro:"阿桂是江阿發的妻子。得知丈夫出車禍後，她一路哭喊，害怕丈夫殘廢後全家失去依靠。進入美國醫院後，她同時恐懼陌生環境，也被補償與物資吸引。",
personality:"你和阿桂一樣，對家庭安全感非常敏感。你的情緒不是脆弱，而是因為你很清楚：一旦主要支柱倒下，整個家庭都可能跟著崩塌。",
quote:"「若是殘廢了，一家大小要怎麼活？」",
symbol:"阿桂象徵底層女性在貧窮與權力面前的求生反應。她的哭泣不是單純悲傷，而是長期生活壓力下的本能防衛。"
},
"阿珠":{
tag:"早熟懂事，替家人著想",
intro:"阿珠是家中長女。父親出事後，她去學校接弟弟們，也想像自己可能被賣去當養女，好替家裡減輕負擔。她在故事中承擔了超過年齡的責任。",
personality:"你和阿珠一樣，常常下意識替別人想很多。你明明也會害怕，卻容易先把自己的感受收起來，選擇照顧家人和穩住場面。",
quote:"「她想到自己也許會被賣去當養女。」",
symbol:"阿珠象徵貧窮家庭中被迫早熟的孩子。她的懂事讓人心疼，因為那不是浪漫的犧牲，而是貧困造成的壓力轉移。"
},
"阿吉":{
tag:"天真敏感，容易滿足",
intro:"阿吉是江阿發的兒子。他因為繳不起代辦費在學校被罰站，後來進入美國醫院，對蘋果、汽水罐與豪華環境感到新奇又興奮。",
personality:"你和阿吉一樣，對世界保有好奇心。即使環境有壓力，你仍會被小小的新鮮事物吸引，從苦日子裡找到短暫的快樂。",
quote:"「一只蘋果可以買四斤米」",
symbol:"阿吉象徵兒童在貧窮中的真實感受。他既承受羞辱，也會被物質新奇吸引，呈現出孩子有限卻誠實的理解。"
},
"格雷上校":{
tag:"外來權力，帶著善意",
intro:"格雷上校是撞傷江阿發的美國人。他送江家人到醫院，提供補償與照顧。表面上他有責任感，但他的存在也代表美國權力與台灣底層家庭之間的不平等。",
personality:"你和格雷上校一樣，遇到問題會想處理，也願意提供資源。不過你也需要提醒自己：幫助別人時，不能只看見自己的善意，也要看見雙方位置的差距。",
quote:"「他願意承擔其日後生活賠償。」",
symbol:"格雷上校象徵外來權力與現代化資源。他不是單純的壞人，但他的善意建立在巨大的階級差距上，因此帶有複雜的諷刺。"
}
};

let index=0;
let scores={};

function startQuiz(){
scores={"江阿發":0,"阿桂":0,"阿珠":0,"阿吉":0,"格雷上校":0};
index=0;
document.getElementById("start").classList.add("hidden");
document.getElementById("result").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
showQuestion();
}

function showQuestion(){
const item=questions[index];
document.getElementById("progressText").innerText="Q"+(index+1)+" / "+questions.length;
document.getElementById("progressFill").style.width=((index+1)/questions.length*100)+"%";
document.getElementById("scene").innerText=item.scene;
document.getElementById("question").innerText=item.q;

const answers=document.getElementById("answers");
answers.innerHTML="";

item.a.forEach(function(ans,i){
const btn=document.createElement("button");
btn.className="choice";
btn.innerHTML=String.fromCharCode(65+i)+". "+ans[0];

btn.onclick=function(){
scores[ans[1]]++;
index++;

if(index<questions.length){
showQuestion();
}else{
showResult();
}
};

answers.appendChild(btn);
});
}

function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

const top=Object.keys(scores).sort(function(a,b){return scores[b]-scores[a];})[0];
const r=results[top];

document.getElementById("roleImage").src=characterImages[top];
document.getElementById("roleName").innerText=top;
document.getElementById("roleTag").innerText=r.tag;
document.getElementById("roleIntro").innerText=r.intro;
document.getElementById("rolePersonality").innerText=r.personality;
document.getElementById("roleQuote").innerText=r.quote;
document.getElementById("roleSymbol").innerText=r.symbol;
}

function restart(){
document.getElementById("result").classList.add("hidden");
document.getElementById("start").classList.remove("hidden");
window.scrollTo(0,0);
}
</script>
</body>
</html>
